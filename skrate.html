  <main class="dl-page">

    <section class="dl-hero">

    <!-- new post form — only visible to whitelisted devs -->
    <section class="dl-compose" id="dl-compose" style="display:none">
      <p class="section-label">// new post</p>
      <div class="dl-compose__form">
        <div class="dl-compose__user" id="dl-compose-user"></div>
        <input
          class="dl-compose__input"
          id="dl-title"
          type="text"
          placeholder="post title..."
          maxlength="120"
        >
        <textarea
          class="dl-compose__textarea"
          id="dl-body"
          placeholder="write your update here..."
          rows="8"
        ></textarea>

        <!-- image URLs — paste a direct image link per line -->
        <label class="dl-compose__label" for="dl-images">
          image URLs <span>(one per line — use imgur, discord CDN, etc.)</span>
        </label>
        <textarea
          class="dl-compose__textarea dl-compose__textarea--sm"
          id="dl-images"
          placeholder="https://i.imgur.com/example.png"
          rows="3"
        ></textarea>

        <div class="dl-compose__actions">
          <button class="btn btn--primary" id="dl-submit">post update →</button>
        </div>
        <p class="dl-compose__error" id="dl-error"></p>
      </div>
    </section>

    <section class="dl-posts">
      <p class="section-label">// updates</p>
      <div class="dl-posts__list" id="dl-posts-list">
        <p class="dl-posts__loading">loading...</p>
